services:
  - type: web
    name: zenix
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --omit=dev
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_PUSH_INTERVAL_MS
        value: "10000"
      - key: CANONICAL_HOST
        sync: false
      - key: CANONICAL_SCHEME
        value: "https"
